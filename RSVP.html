<!DOCTYPE html>
<html lang="it">
<head>
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500;600&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RSVP</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER IDENTICO -->
  <header class="hero">
 
    <header class="header-bar">

      <div class="header-left">
        <img src="header.jpg" alt="Logo matrimonio" class="header-logo" />
        <span class="header-title">Cristina e Alberto</span>
      </div>

      <div class="header-right">
        <a href="index.html" class="header-btn">Home</a>
        <span class="dot-separator">•</span>
        <a href="ListaDiNozze.html" class="header-btn">Lista Di Nozze</a>
        <span class="dot-separator">•</span>
        <a href="RSVP.html" class="header-btn">RSVP</a>
      </div>

    </header>

  </header>

<form id="formCompleto" action="https://formsubmit.co/alberto_noviello@outlook.com" method="POST">

  <!-- CONFIG EMAIL -->
  <input type="hidden" name="_subject" value="Nuova conferma RSVP">
  <input type="hidden" name="_captcha" value="false">
  <input type="hidden" name="_next" value="https://albertoecristina.com/thankyou.html">

  <!-- utile per email -->
  <input type="hidden" name="nome_completo" id="nome_completo">

  <!-- STEP 1 -->
  <div id="step1">
    <label>Nome
      <input type="text" id="nome" name="nome" required>
    </label>

    <label>Cognome
      <input type="text" id="cognome" name="cognome" required>
    </label>

	<button id="continuaBtn" type="button" class="submit-btn" onclick="verificaNome()">
	  Continua
	</button>

    <p id="errore" style="color:red; display:none;">
      Nome non trovato nella lista invitati
    </p>
  </div>

  <!-- STEP 2 -->
  <div id="step2" style="display:none;">

    <label>Parteciperai?
      <select name="presenza" required>
        <option value="si">Sì, ci sarò!</option>
        <option value="no">Purtroppo no</option>
      </select>
    </label>

    <label id="persone-label">
      Numero di persone
      <select id="persone-select" name="persone"></select>
    </label>

    <label>Note
      <textarea name="note"></textarea>
    </label>

    <button type="submit" class="submit-btn">
      Invia
    </button>

  </div>
</form>




<script>

let invitati = [];

// ✅ normalizza stringhe
function normalizza(str) {
  return str
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/'/g, "")
    .replace(/[^a-z\s]/g, "")
    .trim()
    .replace(/\s+/g, " ");
}

// ✅ CONFIG JSONBIN
const BIN_ID = "6a30fe76da38895dfec832a5";
const API_KEY = "$2a$10$9mci6Xi2bRFphPasXuSdle52zgJLxaLCO1FE1dNpwxUWUjb3cC/4K";

fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
  headers: {
    "X-Master-Key": API_KEY
  }
})
.then(res => res.json())
.then(data => {

  // ✅ gestione robusta (copre entrambi i casi)
  if (Array.isArray(data.record)) {
    invitati = data.record;
  } else if (Array.isArray(data.record.record)) {
    invitati = data.record.record;
  } else {
    console.error("Formato JSON inatteso:", data);
    invitati = [];
  }

  console.log("✅ invitati:", invitati);
})
.catch(err => console.error(err));


function verificaNome() {

  const nome = document.getElementById("nome").value;
  const cognome = document.getElementById("cognome").value;

  const completo = normalizza(nome + " " + cognome);
  const errore = document.getElementById("errore");

  console.log("INPUT:", completo);

  // ✅ TROVA IL GRUPPO
  const gruppoTrovato = invitati.find(g => {

    return g.persone.some(p => {
      const full1 = normalizza(p.nome + " " + (p.cognome1 || ""));
      const full2 = normalizza(p.nome + " " + (p.cognome2 || ""));

      return full1 === completo || full2 === completo;
    });

  });

  // ❌ NON TROVATO
  if (!gruppoTrovato) {
    errore.innerText = "Nome non trovato";
    errore.style.display = "block";
    return;
  }

  // ❌ GIÀ CONFERMATO (da chiunque nel gruppo)
  if (gruppoTrovato.confermato) {
    errore.innerText = "Hai già confermato (tu o il tuo accompagnatore)";
    errore.style.display = "block";
    return;
  }

  // ✅ OK → salva gruppo selezionato
  window.gruppoSelezionato = gruppoTrovato;

  mostraForm(gruppoTrovato.max || 1);
}



// ✅ MOSTRA STEP 2
function mostraForm(maxPersone) {

  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";

  const select = document.getElementById("persone-select");
  select.innerHTML = "";

  for (let i = 1; i <= maxPersone; i++) {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = i;
    select.appendChild(opt);
  }

  const nome = document.getElementById("nome").value;
  const cognome = document.getElementById("cognome").value;

  document.getElementById("nome_completo").value =
    nome.trim() + " " + cognome.trim();
}


document.getElementById("formCompleto").addEventListener("submit", function(e) {
  e.preventDefault();

  const gruppo = window.gruppoSelezionato;

  if (!gruppo) return;

  // ✅ marca tutta la coppia come confermata
  gruppo.confermato = true;

  fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": API_KEY
    },
    body: JSON.stringify({
      record: invitati
    })
  })
  .then(() => {
    console.log("✅ Conferma salvata");
    e.target.submit();
  })
  .catch(err => console.error(err));
});


// ✅ gestione presenza
document.addEventListener("DOMContentLoaded", () => {
  const presenzaSelect = document.querySelector('select[name="presenza"]');

  presenzaSelect.addEventListener("change", function () {
    const label = document.getElementById("persone-label");

    if (this.value === "no") {
      label.style.display = "none";
    } else {
      label.style.display = "block";
    }
  });
});


</script>


</body>
</html>
